apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: inno
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: goylikdmitry/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH_POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AUTH_POSTGRES_PASSWORD
            - name: SPRING_JPA_DATABASE_PLATFORM
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SPRING_JPA_DATABASE_PLATFORM
            - name: SPRING_LIQUIBASE_CHANGELOG
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SPRING_LIQUIBASE_CHANGELOG
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: APP_JWT_ACCESS_TOKEN_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_ACCESS_TOKEN_EXPIRATION_MS
            - name: APP_JWT_REFRESH_TOKEN_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_REFRESH_TOKEN_EXPIRATION_MS
            - name: GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GATEWAY_API_KEY
            - name: USER_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_SERVICE_API_KEY
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"