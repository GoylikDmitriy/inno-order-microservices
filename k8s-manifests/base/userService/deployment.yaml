apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: inno
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: goylikdmitry/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_POSTGRES_PASSWORD
            - name: SPRING_JPA_DATABASE_PLATFORM
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: SPRING_JPA_DATABASE_PLATFORM
            - name: SPRING_LIQUIBASE_CHANGELOG
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: SPRING_LIQUIBASE_CHANGELOG
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: SPRING_DATA_REDIS_PORT
            - name: APP_PAYMENT_CARD_ENCRYPTION_BASE64_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CARD_ENCRYPTION_KEY
            - name: GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: GATEWAY_URL
            - name: USER_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_SERVICE_API_KEY
            - name: ORDER_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ORDER_SERVICE_API_KEY
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"