spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userService
                    fallbackUri: forward:/fallback/user

            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authService
                    fallbackUri: forward:/fallback/auth

            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/orders/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: orderService
                    fallbackUri: forward:/fallback/order

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/payments/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: paymentService
                    fallbackUri: forward:/fallback/payment

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 5s
        recordExceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
    instances:
      userService:
        baseConfig: default
      authService:
        baseConfig: default
      orderService:
        baseConfig: default
      paymentService:
        base-config: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
        cancelRunningFuture: true
    instances:
      userService:
        baseConfig: default
      authService:
        baseConfig: default
      orderService:
        baseConfig: default
      paymentService:
        base-config: default

logging:
  level:
    .io.github.resilience4j: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
  info:
    env:
      enabled: true

gateway:
  public-paths:
    - /api/auth/login
    - /api/users/register
  internal-paths:
    - /api/users/internal
    - /api/auth/save-credentials

app:
  jwt:
    secret: ${JWT_SECRET}
    clock-skew-seconds: 30
  internal:
    api-keys:
      gateway: ${GATEWAY_API_KEY}