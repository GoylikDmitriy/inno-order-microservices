spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL}
              predicates:
                - Path=/api/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userService
                    fallbackUri: forward:/fallback/user

            - id: auth-service
              uri: ${AUTH_SERVICE_URL}
              predicates:
                - Path=/api/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authService
                    fallbackUri: forward:/fallback/auth

            - id: order-service
              uri: ${ORDER_SERVICE_URL}
              predicates:
                - Path=/api/orders/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: orderService
                    fallbackUri: forward:/fallback/order

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/payments/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: paymentService
                    fallbackUri: forward:/fallback/payment

app:
  jwt:
    secret: ${JWT_SECRET}
    clock-skew-seconds: 30
  internal:
    api-keys:
      gateway: ${GATEWAY_API_KEY}